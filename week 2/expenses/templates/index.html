<!DOCTYPE html>
<html>
<head>
    <title>My Expense Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }
        .summary {
            background: #e9ecef;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            background: #007bff;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }
        table, th, td {
            border: 1px solid #ddd;
        }
        th, td {
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Expense Tracker Dashboard</h2>
    
    <div class="summary">
        <h3>Total Spent: <span id="total-amount">₹0.00</span></h3>
    </div>

    <form id="expense-form">
        <div class="form-group">
            <label>Description:</label>
            <input type="text" id="desc" placeholder="e.g. Lunch" required>
        </div>
        <div class="form-group">
            <label>Amount (₹):</label>
            <input type="number" id="amount" placeholder="0" required>
        </div>
        <div class="form-group">
            <label>Category:</label>
            <select id="category">
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Bills">Bills</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <button type="submit">Add Expense</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>Description</th>
                <th>Category</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody id="table-body">
            </tbody>
    </table>
</div>

<script>
    const form = document.getElementById('expense-form');

    // Intercept form submissions and send them to Django via HTTP POST
    form.addEventListener('submit', async function(e) {
        e.preventDefault(); // Stop the page from reloading
        
        const desc = document.getElementById('desc').value.trim();
        const amount = parseFloat(document.getElementById('amount').value);
        const category = document.getElementById('category').value;

        // Frontend Validation: Catch basic issues before making a server request
        if (!desc) {
            alert("Please enter a valid item name.");
            return;
        }

        if (isNaN(amount) || amount <= 0) {
            alert("Please enter an amount greater than zero.");
            return;
        }

        const payload = { desc, amount, category };

        try {
            const response = await fetch('/api/expenses/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload) // Convert object to text string
            });

            const result = await response.json();

            if (response.ok) {
                console.log("Record saved successfully!");
                form.reset();       // Clear the form fields
                renderDashboard();  // Refresh the table list dynamically
            } else {
                // Display the specific error message sent back by Django
                alert("Server Error: " + result.error);
            }
        } catch (error) {
            console.error("Network error talking to server.");
            alert("Could not connect to the server. Please check your network connection.");
        }
    });

    // Asynchronous function to fetch live records from your Django views endpoint (HTTP GET)
    async function renderDashboard() {
        try {
            const response = await fetch('/api/expenses/');
            const data = await response.json();
            
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = ''; // Clear old static table rows
            
            let grandTotal = 0;

            // Loop through the dynamic array sent by the backend views controller
            for (let i = 0; i < data.expenses.length; i++) {
                let item = data.expenses[i];
                grandTotal += item.amount;

                // Create a new table row dynamically for each record
                let row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.desc}</td>
                    <td>${item.category}</td>
                    <td>₹${item.amount.toFixed(2)}</td>
                `;
                tbody.appendChild(row);
            }

            // Update your dashboard total metric display element
            document.getElementById('total-amount').innerText = `₹${grandTotal.toFixed(2)}`;
        } catch (error) {
            console.error("Connection link error fetching data from Django backend.");
        }
    }

    // Automatically trigger backend synchronizations when the window viewport loads
    window.addEventListener('DOMContentLoaded', renderDashboard);
</script>

</body>
</html>
