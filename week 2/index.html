<!DOCTYPE html>
<html>
<head>
    <title>My Expense Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }
        .summary {
            background: #e9ecef;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            background: #007bff;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }
        table, th, td {
            border: 1px solid #ddd;
        }
        th, td {
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Expense Tracker Dashboard</h2>
    
    <div class="summary">
        <h3>Total Spent: <span id="total-amount">₹0.00</span></h3>
    </div>

    <form id="expense-form">
        <div class="form-group">
            <label>Description:</label>
            <input type="text" id="desc" placeholder="e.g. Lunch" required>
        </div>
        <div class="form-group">
            <label>Amount (₹):</label>
            <input type="number" id="amount" placeholder="0" required>
        </div>
        <div class="form-group">
            <label>Category:</label>
            <select id="category">
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Bills">Bills</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <button type="submit">Add Expense</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>Description</th>
                <th>Category</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody id="table-body">
            </tbody>
    </table>
</div>

<script>
    // Initial data list
    const myExpenses = [
        { desc: "Lunch at cafeteria", amount: 250, category: "Food" },
        { desc: "Monthly travel pass", amount: 1200, category: "Transport" }
    ];

    const form = document.getElementById('expense-form');

    // Handle form submit
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const desc = document.getElementById('desc').value;
        const amount = parseFloat(document.getElementById('amount').value);
        const category = document.getElementById('category').value;

        if (desc && amount > 0) {
            myExpenses.push({ desc, amount, category });
            renderDashboard();
            form.reset();
        }
    });

    // Update table and total
    function renderDashboard() {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';
        
        let grandTotal = 0;

        for (let i = 0; i < myExpenses.length; i++) {
            let item = myExpenses[i];
            grandTotal += item.amount;

            // Create new row
            let row = document.createElement('tr');
            row.innerHTML = `
                <td>${item.desc}</td>
                <td>${item.category}</td>
                <td>₹${item.amount.toFixed(2)}</td>
            `;
            tbody.appendChild(row);
        }

        // Update total display
        document.getElementById('total-amount').innerText = `₹${grandTotal.toFixed(2)}`;
    }

    // Run on page load
    renderDashboard();
</script>

</body>
</html>
