<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Personal Expense Tracker Dashboard</title>
    <style>
        :root { --bg-color: #f4f6f9; --card-color: #ffffff; --primary-color: #4f46e5; --text-color: #1f2937; --border-color: #e5e7eb; }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card-color); border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; }
        .card h3 { margin: 0 0 10px 0; font-size: 14px; color: #6b7280; }
        .card .amount { font-size: 24px; font-weight: bold; }
        .card .amount.total { color: var(--primary-color); }
        .main-content { display: grid; grid-template-columns: 1fr 2fr; gap: 30px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 14px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; background-color: var(--primary-color); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; background: var(--card-color); border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color); }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        th { background-color: #f9fafb; font-weight: 600; }
        .badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 12px; background-color: #e0e7ff; color: #4338ca; }
        .chart-container { margin-top: 25px; }
        .bar-row { margin-bottom: 10px; }
        .bar-outer { background: #e5e7eb; border-radius: 4px; height: 12px; width: 100%; }
        .bar-inner { background: var(--primary-color); height: 100%; width: 0%; transition: width 0.4s; }
    </style>
</head>
<body>
<div class="container">
    <header><h1>Expense Tracker Dashboard</h1></header>
    <div class="summary-grid">
        <div class="card"><h3>Total Balance</h3><div class="amount total" id="total-display">₹0.00</div></div>
        <div class="card"><h3>Food & Dining</h3><div class="amount" id="food-display">₹0.00</div></div>
        <div class="card"><h3>Transport</h3><div class="amount" id="transport-display">₹0.00</div></div>
        <div class="card"><h3>Utilities & Bills</h3><div class="amount" id="bills-display">₹0.00</div></div>
    </div>
    <div class="main-content">
        <div class="card">
            <h3>Add New Transaction</h3>
            <form id="expense-form">
                <div class="form-group"><label>Description</label><input type="text" id="desc" required></div>
                <div class="form-group"><label>Amount (₹)</label><input type="number" id="amount" step="0.01" required></div>
                <div class="form-group"><label>Category</label>
                    <select id="category"><option value="Food">Food</option><option value="Transport">Transport</option><option value="Bills">Bills</option><option value="Other">Other</option></select>
                </div>
                <button type="submit">Log Expense</button>
            </form>
            <div class="chart-container"><div id="chart-bars"></div></div>
        </div>
        <div>
            <table id="expense-table">
                <thead><tr><th>Description</th><th>Category</th><th>Amount</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>
<script>
    const expenses = [
        { description: "Lunch at cafeteria", amount: 250.00, category: "Food" },
        { description: "Monthly travel pass", amount: 1200.00, category: "Transport" },
        { description: "Internet Bill", amount: 799.00, category: "Bills" }
    ];
    const form = document.getElementById('expense-form');
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        const description = document.getElementById('desc').value.trim();
        const amount = parseFloat(document.getElementById('amount').value);
        const category = document.getElementById('category').value;
        if(description && amount > 0) { expenses.push({ description, amount, category }); updateDashboard(); form.reset(); }
    });
    function updateDashboard() {
        const tbody = document.getElementById('table-body'); tbody.innerHTML = '';
        let total = 0; const catTotals = { Food: 0, Transport: 0, Bills: 0, Other: 0 };
        expenses.forEach(exp => {
            total += exp.amount;
            if(catTotals[exp.category] !== undefined) { catTotals[exp.category] += exp.amount; } else { catTotals['Other'] += exp.amount; }
            const row = document.createElement('tr');
            row.innerHTML = `<td>${exp.description}</td><td><span class="badge">${exp.category}</span></td><td>₹${exp.amount.toFixed(2)}</td>`;
            tbody.appendChild(row);
        });
        document.getElementById('total-display').innerText = `₹${total.toFixed(2)}`;
        document.getElementById('food-display').innerText = `₹${catTotals.Food.toFixed(2)}`;
        document.getElementById('transport-display').innerText = `₹${catTotals.Transport.toFixed(2)}`;
        document.getElementById('bills-display').innerText = `₹${catTotals.Bills.toFixed(2)}`;
        const chartSection = document.getElementById('chart-bars'); chartSection.innerHTML = '';
        Object.keys(catTotals).forEach(cat => {
            const catAmt = catTotals[cat]; if(catAmt > 0) {
                const pct = total > 0 ? ((catAmt / total) * 100).toFixed(0) : 0;
                const barRow = document.createElement('div'); barRow.className = 'bar-row';
                barRow.innerHTML = `<div style="display:flex; justify-content:space-between; font-size:13px;"><span>${cat}</span><span>₹${catAmt} (${pct}%)</span></div><div class="bar-outer"><div class="bar-inner" style="width: ${pct}%"></div></div>`;
                chartSection.appendChild(barRow);
            }
        });
    }
    updateDashboard();
</script>
</body>
</html>
