<!DOCTYPE html>
<html>
<head>
    <title>Notes Management System</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f0f2f5; 
            padding: 20px; 
        }
        .container { 
            max-width: 600px; 
            margin: 0 auto; 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
        }
        .form-group { 
            margin-bottom: 15px; 
        }
        .form-group label { 
            display: block; 
            margin-bottom: 5px; 
            font-weight: bold; 
        }
        .form-group input, .form-group textarea, .form-group select { 
            width: 100%; 
            padding: 8px; 
            box-sizing: border-box; 
            border: 1px solid #ddd; 
            border-radius: 4px; 
        }
        button { 
            background: #007bff; 
            color: white; 
            padding: 10px 15px; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 14px; 
        }
        .note-card { 
            background: #f8f9fa; 
            border-left: 5px solid #007bff; 
            padding: 15px; 
            margin-bottom: 15px; 
            border-radius: 4px; 
            position: relative; 
        }
        .note-tag { 
            display: inline-block; 
            background: #e9ecef; 
            font-size: 12px; 
            padding: 2px 8px; 
            border-radius: 12px; 
            margin-top: 5px; 
            font-weight: bold; 
        }
        .delete-btn { 
            background: #dc3545; 
            color: white; 
            padding: 4px 8px; 
            font-size: 12px; 
            border-radius: 4px; 
            border: none; 
            position: absolute; 
            right: 15px; 
            top: 15px; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Notes Management Dashboard</h2>
    
    <form id="note-form" style="margin-bottom: 30px;">
        <div class="form-group">
            <label>Note Title:</label>
            <input type="text" id="title" placeholder="e.g., Study Plan" required>
        </div>
        <div class="form-group">
            <label>Content:</label>
            <textarea id="content" rows="3" placeholder="Write your details here..." required></textarea>
        </div>
        <div class="form-group">
            <label>Tag:</label>
            <select id="tag">
                <option value="Personal">Personal</option>
                <option value="Study">Study</option>
                <option value="Work">Work</option>
            </select>
        </div>
        <button type="submit">Save Note</button>
    </form>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-top: 1px solid #eee; padding-top: 15px;">
        <h4 style="margin: 0;">Saved Notes:</h4>
        <div>
            <label style="font-size: 14px; margin-right: 5px;">Filter Tag:</label>
            <select id="filter-tag" onchange="renderNotes()" style="padding: 5px; border-radius: 4px;">
                <option value="All">All Tags</option>
                <option value="Personal">Personal</option>
                <option value="Study">Study</option>
                <option value="Work">Work</option>
            </select>
        </div>
    </div>

    <div id="notes-container"></div>
</div>

<script>
    const form = document.getElementById('note-form');

    // Intercept form submissions and send them to the backend via POST
    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        const title = document.getElementById('title').value.trim();
        const content = document.getElementById('content').value.trim();
        const tag = document.getElementById('tag').value;

        // Frontend Validation
        if (!title || !content) {
            alert("Please fill out all fields.");
            return;
        }

        try {
            const response = await fetch('/api/expenses/', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, content, tag })
            });

            if (response.ok) {
                form.reset();
                renderNotes();
            } else {
                const res = await response.json();
                alert("Error: " + res.error);
            }
        } catch (error) {
            alert("Network connection error.");
        }
    });

    // Send a DELETE request to remove a specific note by ID
    async function deleteNote(id) {
        if (!confirm("Delete this note permanently?")) return;

        try {
            const response = await fetch('/api/expenses/', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id })
            });

            if (response.ok) renderNotes();
        } catch (error) {
            console.error("Network error during deletion.");
        }
    }

    // Fetch live data records from Django and render them as filtered cards
    async function renderNotes() {
        try {
            const response = await fetch('/api/expenses/');
            const data = await response.json();
            
            const container = document.getElementById('notes-container');
            container.innerHTML = '';
            
            const activeFilter = document.getElementById('filter-tag').value;

            data.notes.forEach(note => {
                // Client-Side Conditional Filter Check
                if (activeFilter !== "All" && note.tag !== activeFilter) return;

                const card = document.createElement('div');
                card.className = 'note-card';
                card.innerHTML = `
                    <h3 style="margin: 0 0 8px 0; font-size: 18px; padding-right: 60px;">${note.title}</h3>
                    <p style="margin: 0; color: #495057; font-size: 14px; white-space: pre-wrap;">${note.content}</p>
                    <span class="note-tag">${note.tag}</span>
                    <button class="delete-btn" onclick="deleteNote(${note.id})">Delete</button>
                `;
                container.appendChild(card);
            });
        } catch (error) {
            console.error("Failed to load notes from Django backend.");
        }
    }

    // Trigger on page load
    window.addEventListener('DOMContentLoaded', renderNotes);
</script>
</body>
</html>
